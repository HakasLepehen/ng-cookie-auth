<div class="auth-container">
  <div class="auth-card">
    <h2 class="auth-title">Authentication</h2>

    <form [formGroup]="authForm" (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          formControlName="email"
          class="form-control"
          [class.is-invalid]="submitted && f['email'].errors"
          placeholder="Enter your email">
        <div *ngIf="submitted && f['email'].errors" class="error-message">
          <div *ngIf="f['email'].errors['required']">Email is required</div>
          <div *ngIf="f['email'].errors['email']">Please enter a valid email</div>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          formControlName="password"
          class="form-control"
          [class.is-invalid]="submitted && f['password'].errors"
          placeholder="Enter your password">
        <div *ngIf="submitted && f['password'].errors" class="error-message">
          <div *ngIf="f['password'].errors['required']">Password is required</div>
          <div *ngIf="f['password'].errors['minlength']">Password must be at least 6 characters</div>
        </div>
      </div>

      <div class="button-group">
        <button
          type="submit"
          name="action"
          value="login"
          class="btn btn-primary"
          [disabled]="loading">
          <span *ngIf="loading && action === 'login'" class="spinner"></span>
          Login
        </button>

        <button
          type="submit"
          name="action"
          value="signup"
          class="btn btn-secondary"
          [disabled]="loading">
          <span *ngIf="loading && action === 'signup'" class="spinner"></span>
          Sign Up
        </button>
      </div>
    </form>

    <div *ngIf="message" class="message" [class.success]="messageType === 'success'" [class.error]="messageType === 'error'">
      {{ message }}
    </div>
  </div>
</div>
